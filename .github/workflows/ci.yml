name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      db: ${{ steps.filter.outputs.db }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v3
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
              - '!backend/database.Dockerfile'
              - '!backend/db-init.sql'
            db:
              - 'backend/database.Dockerfile'
              - 'backend/db-init.sql'
            infra:
              - 'infra/terraform/**'

  build-and-push:
    needs: detect-changes
    runs-on: self-hosted # Usar runner local para tener acceso a localhost:5000 y al cluster k3s
    steps:
      - name: Fix workspace permissions
        run: sudo chown -R $USER:$USER $GITHUB_WORKSPACE || true
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build & Push Frontend
        if: needs.detect-changes.outputs.frontend == 'true'
        run: |
          docker build -t localhost:5000/frontend:latest -f frontend/Dockerfile frontend/
          docker push localhost:5000/frontend:latest

      - name: Build & Push Backend
        if: needs.detect-changes.outputs.backend == 'true'
        run: |
          docker build -t localhost:5000/backend:latest -f backend/Dockerfile backend/
          docker push localhost:5000/backend:latest

      - name: Build & Push DB (Postgres)
        if: needs.detect-changes.outputs.db == 'true'
        run: |
          docker build -t localhost:5000/db:latest -f backend/database.Dockerfile backend/
          docker push localhost:5000/db:latest

  deploy-terraform:
    needs: [detect-changes, build-and-push]
    # Si cualquiera de estos cambió, ejecutamos terraform para forzar el reinicio o aplicar cambios de infraestructura
    if: |
      always() && 
      (needs.detect-changes.outputs.frontend == 'true' || 
       needs.detect-changes.outputs.backend == 'true' || 
       needs.detect-changes.outputs.db == 'true' || 
       needs.detect-changes.outputs.infra == 'true')
    runs-on: self-hosted
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - name: Fix workspace permissions
        run: sudo chown -R $USER:$USER $GITHUB_WORKSPACE || true
        working-directory: ${{ github.workspace }}
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Restart Deployments (if image updated without tag change)
        run: |
          kubectl rollout restart deployment/frontend-deployment -n devops-app || true
          kubectl rollout restart deployment/backend-deployment -n devops-app || true
          kubectl rollout restart deployment/postgres-deployment -n devops-app || true
